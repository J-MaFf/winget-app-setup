name: Windows Tests (Pester)

# Runs the Pester v5 unit suite on a real Windows runner. This is where Windows-native
# test execution happens, since the Claude Code action (claude.yml) cannot run on
# Windows runners. @claude (on ubuntu) can read these results via `actions: read`.
#
# Runs on the self-hosted win-test runner (Windows Server 2025, pwsh 7.6.3). Module
# installs (Microsoft.WinGet.Client, Pester) persist across runs there, so the guarded
# installs below are no-ops after the first run.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pester:
    runs-on: [self-hosted, windows]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Microsoft.WinGet.Client (mockable winget cmdlets)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # The unit suite mocks Get-WinGetPackage etc.; Pester can only mock commands that
          # already exist, so the Microsoft.WinGet.Client cmdlets must be present on the runner.
          if (-not (Get-Command Get-WinGetPackage -ErrorAction SilentlyContinue)) {
            Install-Module Microsoft.WinGet.Client -Force -SkipPublisherCheck -Scope CurrentUser
          }
          Import-Module Microsoft.WinGet.Client

      - name: Verify generated installer is in sync with the module
        shell: pwsh
        run: |
          # Verify winget-app-install.ps1 has not drifted from the WingetAppSetup module, and
          # that the installer invokes no hyphenated command that resolves to neither a module
          # function nor an external cmdlet. Both checks live in the build script's -Check mode,
          # which exits non-zero on failure; that propagates through $LASTEXITCODE and fails the job.
          #
          # This runs AFTER the Microsoft.WinGet.Client install: the undefined-reference guard
          # resolves external cmdlets via Get-Command, so the WinGet client cmdlets the installer
          # calls (Get-WinGetPackage, etc.) must already be discoverable on the runner or the guard
          # false-positives on them.
          pwsh -File ./build/Build-WingetInstallScript.ps1 -Check

      - name: Run Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Guarded install: Pester 5 persists on the self-hosted runner after the first run.
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [version]'5.0.0' })) {
            Install-Module Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck -Scope CurrentUser
          }
          Import-Module Pester -MinimumVersion 5.0.0

          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true               # non-zero exit on failure -> fails the step
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = 'testResults.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pester-results
          path: testResults.xml
          if-no-files-found: ignore
